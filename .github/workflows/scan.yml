name: ICT SCAN alerts

on:
  schedule:
    # Every 15 minutes. GitHub does not guarantee this runs exactly on time —
    # during high load it can slip by several minutes, and schedules are
    # disabled automatically after 60 days with no repo activity (this
    # workflow's own state.json commits count as activity, so it should
    # keep itself alive as long as a STRONG crossover fires at least once
    # every couple of months — check in on it occasionally regardless).
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      test_push:
        description: 'Send a test push notification instead of running the real scan'
        type: boolean
        default: false

permissions:
  contents: write   # needed so the job can commit the updated state.json back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run scanner
        env:
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TEST_PUSH: ${{ github.event.inputs.test_push }}
        run: node scan.js

      - name: Commit updated state
        run: |
          git config user.name "ict-scan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "scan state update"
          git pull --rebase --autostash origin main
          git push
